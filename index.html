<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suraj's Website</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #333;
        }

        header {
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            letter-spacing: 1px;
        }

        main {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
            animation: fadeIn 1s ease-in-out;
        }

        .card h2 {
            margin-bottom: 10px;
            color: #333;
        }

        .card p {
            margin-bottom: 20px;
            color: #666;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #667eea;
            color: white;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #764ba2;
            transform: scale(1.05);
        }

        footer {
            text-align: center;
            padding: 15px;
            background: rgba(0,0,0,0.7);
            color: white;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media(max-width: 500px) {
            .card {
                margin: 20px;
                padding: 25px;
            }
        }
    </style>
</head>
<body>

    <header>
        🚀 Welcome to My Website
    </header>

    <main>
        <div class="card">
            <h2>Hello Suraj 👋</h2>
            <p>This is your modern website deployed using AWS CI/CD 🎉</p>
            <button onclick="showMessage()">Click Me</button>
        </div>
    </main>

    <footer>
        © 2026 | Built with ❤️ by Suraj
    </footer>

    <script>
        function showMessage() {
            alert("🔥 Your CI/CD pipeline is working!");
        }
    </script>

</body>
</html>
